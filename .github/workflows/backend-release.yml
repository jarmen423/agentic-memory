name: backend-release

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Container tag for the backend image."
        required: false
        default: manual
        type: string
      publish_to_ghcr:
        description: "Push the backend image to GitHub Container Registry."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: backend-release-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/agentic-memory-am-server

jobs:
  validate-backend-stack:
    name: Validate Backend Stack
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate publication contract
        run: python -m pytest tests/test_publication_config.py tests/test_am_server.py -k publication -q

      - name: Render production compose with example env
        run: docker compose -f docker-compose.prod.yml --env-file .env.production.example config

  build-backend-image:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs:
      - validate-backend-stack
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}

      - name: Record image reference
        id: meta
        run: echo "image_ref=${IMAGE_NAME}:${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"

      - name: Summarize backend artifact
        run: |
          {
            echo "## Backend Image"
            echo
            echo "- Image: \`${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}\`"
            echo "- Publish requested: \`${{ inputs.publish_to_ghcr }}\`"
            echo "- Compose env template: \`.env.production.example\`"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-backend-image:
    name: Publish Backend Image
    runs-on: ubuntu-latest
    needs:
      - build-backend-image
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_to_ghcr }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}
