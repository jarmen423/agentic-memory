name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Ruff linter
        run: ruff check src/

      - name: Run Black format check
        run: black --check src/ tests/

      - name: Run MyPy type check
        run: mypy src/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run OpenClaw dashboard API merge gate
        run: python -m pytest tests/test_am_server.py tests/test_openclaw_contract.py desktop_shell/tests/test_app.py -q

      - name: Run OpenClaw E2E/load/chaos merge gate
        run: python -m pytest tests/e2e/test_openclaw_e2e.py tests/load/test_openclaw_load.py tests/chaos/test_openclaw_chaos.py -q

      - name: Run unit tests with coverage
        run: pytest --cov=agentic_memory --cov=am_server --cov-report=xml --cov-report=term-missing -m "not integration" tests/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  integration-test:
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5.18-community
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p testpassword 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Wait for Neo4j
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:7474/db/data/ > /dev/null 2>&1; then
              echo "Neo4j is ready"
              break
            fi
            echo "Waiting for Neo4j... ($i)"
            sleep 2
          done

      - name: Run integration tests
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: testpassword
          OPENAI_API_KEY: sk-test-key
        run: pytest -m integration tests/

  openclaw-docs-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify private beta documentation bundle exists
        run: |
          test -f docs/openclaw/README.md
          test -f docs/openclaw/guides/PRIVATE_BETA_QUICKSTART.md
          test -f docs/openclaw/openapi/README.md
          test -f docs/openclaw/openapi/agentic-memory-openclaw.openapi.json
          test -f docs/openclaw/beta/README.md
          test -f docs/openclaw/support/README.md
          test -f docs/openclaw/marketplace/PUBLISHING_CHECKLIST.md
          test -f docs/INSTALLATION.md
          test -f docs/TROUBLESHOOTING.md
          test -f docs/SETUP_FULL_STACK.md
          test -f docs/SPACETIMEDB_OPERATIONS.md

      - name: Verify onboarding docs match the doctor-first flow
        run: |
          grep -F "openclaw agentic-memory doctor" docs/INSTALLATION.md
          grep -F "openclaw agentic-memory doctor" docs/openclaw/guides/PRIVATE_BETA_QUICKSTART.md
          grep -F "STDB_URI" docs/SETUP_FULL_STACK.md
          grep -F "STDB_URI" docs/SPACETIMEDB_OPERATIONS.md

      - name: Validate OpenClaw OpenAPI contract against the live app
        run: python -c "from am_server.app import create_app; spec = create_app().openapi(); assert '/openclaw/memory/search' in spec['paths']; print('openapi ok')"

      - name: Validate onboarding health contract against the live app
        run: python -c "from fastapi.testclient import TestClient; from am_server.app import create_app; client = TestClient(create_app(), raise_server_exceptions=False); payload = client.get('/health/onboarding').json(); assert client.get('/health/onboarding').status_code == 200; assert payload['doctor_command'] == 'openclaw agentic-memory doctor'; assert payload['plugin_package_name'] == 'agentic-memory-openclaw'; print('onboarding contract ok')"

  openclaw-typescript:
    runs-on: ubuntu-latest
    env:
      OPENCLAW_WORKSPACE: packages/am-openclaw
      OPENCLAW_PACKAGE_NAME: agentic-memory-openclaw

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install workspace dependencies
        run: npm ci

      - name: Verify OpenClaw package identity
        run: |
          ACTUAL_NAME=$(node -p "require('./packages/am-openclaw/package.json').name")
          test "$ACTUAL_NAME" = "$OPENCLAW_PACKAGE_NAME"

      - name: Run OpenClaw package tests
        run: npm run test --workspace "$OPENCLAW_WORKSPACE"

      - name: Build OpenClaw package
        run: npm run build --workspace "$OPENCLAW_WORKSPACE"

      - name: Typecheck OpenClaw package
        run: npm run typecheck --workspace "$OPENCLAW_WORKSPACE"

      - name: Pack OpenClaw package
        run: npm pack --workspace "$OPENCLAW_WORKSPACE" --dry-run

      - name: Build dashboard workspace
        run: npm run build --workspace am-dashboard

      - name: Run dashboard workspace tests
        run: npm run test --workspace am-dashboard

      - name: Typecheck dashboard workspace
        run: npm run typecheck --workspace am-dashboard

      - name: Validate release deployment scaffold
        run: docker compose -f docker-compose.prod.yml config
