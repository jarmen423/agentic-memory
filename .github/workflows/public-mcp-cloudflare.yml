name: public-mcp-cloudflare

on:
  workflow_dispatch:
    inputs:
      backend_origin:
        description: "HTTPS origin for the existing Agentic Memory backend."
        required: true
        default: "https://backend.agentmemorylabs.com"
        type: string
      public_base_url:
        description: "External public base URL for publication and MCP review."
        required: true
        default: "https://mcp.agentmemorylabs.com"
        type: string
      openai_apps_challenge_token:
        description: "Optional token to serve at /.well-known/openai-apps-challenge for OpenAI domain verification."
        required: false
        default: ""
        type: string
      deploy:
        description: "Deploy to Cloudflare after validation."
        required: false
        default: false
        type: boolean

jobs:
  validate-public-edge:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/cloudflare-public-edge
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: deploy/cloudflare-public-edge/package.json

      - name: Install Worker dependencies
        run: npm install

      - name: Inject deploy-time Worker vars
        env:
          BACKEND_ORIGIN_INPUT: ${{ inputs.backend_origin }}
          PUBLIC_BASE_URL_INPUT: ${{ inputs.public_base_url }}
          OPENAI_APPS_CHALLENGE_TOKEN_INPUT: ${{ inputs.openai_apps_challenge_token }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("wrangler.jsonc")
          config = json.loads(path.read_text())
          config.setdefault("vars", {})
          config["vars"]["BACKEND_ORIGIN"] = os.environ["BACKEND_ORIGIN_INPUT"]
          config["vars"]["PUBLIC_BASE_URL"] = os.environ["PUBLIC_BASE_URL_INPUT"]
          config["vars"]["OPENAI_APPS_CHALLENGE_TOKEN"] = os.environ["OPENAI_APPS_CHALLENGE_TOKEN_INPUT"]
          path.write_text(json.dumps(config, indent=2) + "\n")
          PY

      - name: Dry-run Cloudflare deployment
        run: npx wrangler deploy --dry-run

  deploy-public-edge:
    needs: validate-public-edge
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/cloudflare-public-edge
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: deploy/cloudflare-public-edge/package.json

      - name: Install Worker dependencies
        run: npm install

      - name: Inject deploy-time Worker vars
        env:
          BACKEND_ORIGIN_INPUT: ${{ inputs.backend_origin }}
          PUBLIC_BASE_URL_INPUT: ${{ inputs.public_base_url }}
          OPENAI_APPS_CHALLENGE_TOKEN_INPUT: ${{ inputs.openai_apps_challenge_token }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("wrangler.jsonc")
          config = json.loads(path.read_text())
          config.setdefault("vars", {})
          config["vars"]["BACKEND_ORIGIN"] = os.environ["BACKEND_ORIGIN_INPUT"]
          config["vars"]["PUBLIC_BASE_URL"] = os.environ["PUBLIC_BASE_URL_INPUT"]
          config["vars"]["OPENAI_APPS_CHALLENGE_TOKEN"] = os.environ["OPENAI_APPS_CHALLENGE_TOKEN_INPUT"]
          path.write_text(json.dumps(config, indent=2) + "\n")
          PY

      - name: Deploy Cloudflare public edge
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
