# Controlled-beta production scaffold for the OpenClaw-facing Agentic Memory
# stack. This file is intentionally conservative:
# - one Neo4j instance
# - one am-server instance
# - local-only Neo4j bindings by default
# - no package-name assumptions baked into deployment
#
# The actual OpenClaw plugin package name is still a release-time decision.
# Deployment can move forward because the runtime surface is the HTTP backend,
# not the npm package name itself.

services:
  neo4j:
    profiles:
      - bundled-neo4j
    image: neo4j:5.25-community
    container_name: agentic-memory-neo4j-prod
    restart: unless-stopped
    environment:
      # Defaults keep `docker compose config` renderable in CI. Replace them in
      # a real `.env.production` file before exposing this stack to users.
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-change-me}
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-change-me}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL_SIZE:-1G}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX_SIZE:-2G}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE_SIZE:-1G}
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
    ports:
      - "${NEO4J_HTTP_BIND_ADDRESS:-127.0.0.1}:${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_BIND_ADDRESS:-127.0.0.1}:${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    healthcheck:
      test:
        - CMD-SHELL
        - cypher-shell -u "$$NEO4J_USER" -p "$$NEO4J_PASSWORD" "RETURN 1"
      interval: 10s
      timeout: 20s
      retries: 8
      start_period: 40s

  am-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: agentic-memory/am-server:beta
    container_name: agentic-memory-openclaw-server
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
      AGENTIC_MEMORY_PRODUCT_STATE: /var/lib/agentic-memory/product-state.json
      AGENTIC_MEMORY_DEPLOYMENT_MODE: ${AGENTIC_MEMORY_DEPLOYMENT_MODE:-managed}
      AGENTIC_MEMORY_HOSTED_BASE_URL: ${AGENTIC_MEMORY_HOSTED_BASE_URL:-}
      AM_SERVER_HOST: 0.0.0.0
      AM_SERVER_PORT: 8765
      AM_PUBLIC_BASE_URL: ${AM_PUBLIC_BASE_URL:-}
      # REST auth is mandatory for the OpenClaw plugin surface. Public and
      # internal hosted-MCP surfaces remain optional and can be added later.
      AM_SERVER_API_KEYS: ${AM_SERVER_API_KEYS:-change-me}
      AM_SERVER_PUBLIC_MCP_API_KEYS: ${AM_SERVER_PUBLIC_MCP_API_KEYS:-}
      AM_SERVER_INTERNAL_MCP_API_KEYS: ${AM_SERVER_INTERNAL_MCP_API_KEYS:-}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-change-me}
      # At least one embedding-capable provider key should be configured for
      # the workloads you intend to expose during beta.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      # Temporal bridge wiring stays optional for this beta scaffold.
      # When enabled, set STDB_URI explicitly. Do not rely on ambient defaults
      # such as localhost:3000 because that port may belong to another service.
      STDB_URI: ${STDB_URI:-}
      STDB_MODULE_NAME: ${STDB_MODULE_NAME:-agentic-memory-temporal}
      STDB_BINDINGS_MODULE: ${STDB_BINDINGS_MODULE:-}
    command:
      - python
      - -m
      - am_server.server
    ports:
      - "${AM_SERVER_BIND_ADDRESS:-0.0.0.0}:${AM_SERVER_EXTERNAL_PORT:-8765}:8765"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - agentic_memory_state:/var/lib/agentic-memory
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request
          urllib.request.urlopen("http://127.0.0.1:8765/health", timeout=5).read()
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  agentic_memory_state:
