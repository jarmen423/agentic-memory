[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "am-codex-watch"
version = "0.1.1"
description = "Tail Codex rollout JSONL sessions and POST turns to am-server (background ingest)"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27.0",
    "watchdog>=3.0.0",
    "tomli>=2.0.0 ; python_version < '3.11'",
]

[project.scripts]
am-codex-watch = "am_codex_watch.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/am_codex_watch"]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-mock>=3.10.0",
    "ruff>=0.1.0",
    "black>=23.0.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q --tb=short"
pythonpath = ["src"]

[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312"]

[tool.ruff]
target-version = "py310"
line-length = 100
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM"]
ignore = ["E501"]
